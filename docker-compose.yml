# Local Postgres for tot (optional if you use Neon for dev).
# docker compose up -d
# DATABASE_URL=postgresql://tot:tot@localhost:5432/tot
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tot
      POSTGRES_PASSWORD: tot
      POSTGRES_DB: tot
    ports:
      - "5432:5432"
    volumes:
      - tot_pgdata:/var/lib/postgresql/data

volumes:
  tot_pgdata:
